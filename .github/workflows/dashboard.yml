name: Dashboard CI

on:
  push:
    branches: [main]
    paths:
      - "ops-dashboard/**"
      - ".github/workflows/dashboard.yml"
  pull_request:
    branches: [main]
    paths:
      - "ops-dashboard/**"
      - ".github/workflows/dashboard.yml"

jobs:
  test:
    name: Lint, test & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ops-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ops-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        # No spec files exist yet — this step is a placeholder.
        # Remove the 'continue-on-error' once spec files are added.
        run: npm test -- --watch=false
        continue-on-error: true

      - name: Production build
        run: npm run build
